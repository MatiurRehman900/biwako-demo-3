    <script>
        function loadServices() {
            function el(html) { const d = document.createElement('div'); d.innerHTML = html; return d.firstElementChild }
            const lang = window.__SITE_LANG || 'en';
            fetch(`data/services.${lang}.json`)
                .then(r => r.json())
                .then(services => {
                    const container = document.getElementById('services-list');
                    if (!container) return;
                    // determine if a specific service id is requested
                    const params = new URLSearchParams(window.location.search);
                    const requestedId = params.get('id');
                    if (requestedId) {
                        const s = services.find(x => x.id === requestedId);
                        // if (!s) {
                        //     container.innerHTML = '<div class="col-12">Service not found. <a href="index.html#services">Back to services</a></div>';
                        //     return;
                        // }
                        let html = `<h2 class="wow fadeInUp" data-wow-delay="0.2s">${s.title}</h2>`;
                        (s.bullets || []).forEach((bullet, index) => {
                            const imgs = Array.isArray(bullet.img) ? bullet.img : [bullet.img || ''];
                            const [title, desc] = bullet.desc.split(' - ');

                            let imageHtml = '';
                            if (imgs.length > 1) {
                                // Multiple images - create carousel
                                const carouselId = `carousel-${index}`;
                                imageHtml = `
                                    <div id="${carouselId}" class="carousel slide" data-bs-ride="carousel" data-bs-interval="1000">
                                        <div class="carousel-inner">
                                            ${imgs.map((img, i) => `
                                                <div class="carousel-item ${i === 0 ? 'active' : ''}">
                                                    <img src="${img}" alt="${s.title} - ${title || bullet.desc}" class="rounded-1 d-block w-100" style="height: 300px; object-fit: cover;">
                                                </div>
                                            `).join('')}
                                        </div>
                                        <button class="carousel-control-prev" type="button" data-bs-target="#${carouselId}" data-bs-slide="prev">
                                            <span class="carousel-control-prev-icon" style="background-image:none;"></span>
                                        </button>
                                        <button class="carousel-control-next" type="button" data-bs-target="#${carouselId}" data-bs-slide="next">
                                            <span class="carousel-control-next-icon" style="background-image:none;"></span>
                                        </button>
                                    </div>
                                `;
                            } else {
                                // Single image
                                imageHtml = `<img src="${imgs[0]}" alt="${s.title} - ${title || bullet.desc}" class="rounded-1 hover-scale-1-1" style="height: 300px; width: 100%; object-fit: cover;">`;
                            }

                            html += `
                                <div class="col-lg-3 wow fadeInUp" data-wow-delay="${0.4 + index * 0.3}s">
                                    <div class="bg-light rounded-1 p-2 row">
                                        <div class="col-md-12 bg-white rounded-1 p-2">
                                            ${imageHtml}
                                        </div>
                                        <div class="col-md-12 ">
                                            <h4 class="id-color">${title || bullet.desc}</h4>
                                            <p class="fs-18">${desc || ''}</p>
                                        </div>
                                    </div>
                                </div>
                            `;
                        });
                        // html += `<div class="text-center mt-5 wow fadeInUp" data-wow-delay="2s"><a class="btn-main fx-slide" href="index.html#services"><span>Back to Services</span></a></div>`;
                        container.innerHTML = html;
                        // Initialize carousels when they scroll into view (fixes off-screen carousels not playing)
                        const observer = new IntersectionObserver(function(entries) {
                            entries.forEach(function(entry) {
                                if (entry.isIntersecting) {
                                    const c = new bootstrap.Carousel(entry.target, { interval: 1000, ride: 'carousel' });
                                    c.cycle();
                                    observer.unobserve(entry.target);
                                }
                            });
                        }, { threshold: 0.1 });
                        container.querySelectorAll('.carousel').forEach(function(el) { observer.observe(el); });
                        // Force full page reflow so footer is reachable and scroll is not capped.
                        // The theme calculates page height at window.load, before async content exists.
                        // We reset any inline height locks and trigger resize after the browser paints.
                        document.getElementById('wrapper').style.height = 'auto';
                        document.getElementById('wrapper').style.minHeight = 'auto';
                        document.body.style.height = 'auto';
                        document.documentElement.style.height = 'auto';
                        requestAnimationFrame(function() {
                            requestAnimationFrame(function() {
                                window.dispatchEvent(new Event('resize'));
                            });
                        });
                        return;
                    }

                    // otherwise render list
                    services.forEach(s => {
                        const imageHtml = s.image ? `<img src="${s.image}" alt="${s.title}" style="max-width:100%;max-height:160px;object-fit:cover;">` : `<div style="width:100%;height:160px;display:flex;align-items:center;justify-content:center;background:#f5f5f5;color:#999;border-radius:6px;">Image Placeholder</div>`;
                        const bullets = (s.bullets || []).slice(0, 4).map(b => `<li>${typeof b === 'object' ? b.desc : b}</li>`).join('');
                        const card = `
                            <div class="col-lg-4 col-md-6">
                                <a href="services.html?id=${encodeURIComponent(s.id)}" class="d-block text-decoration-none text-dark">
                                    <div class="bg-light rounded-1 p-4 h-100">
                                        <div class="mb-3">${imageHtml}</div>
                                        <h4>${s.title}</h4>
                                        <p class="text-muted">${s.short}</p>
                                        <ul class="mb-0">${bullets}</ul>
                                    </div>
                                </a>
                            </div>
                        `;
                        container.insertAdjacentHTML('beforeend', card);
                    });
                })
                .catch(err => {
                    console.error('Failed to load services.json', err);
                    const container = document.getElementById('services-list');
                    if (container) container.innerHTML = '<div class="col-12">Failed to load services.</div>';
                });
        }

        if (window.__SITE_LANG) {
            loadServices();
        } else {
            document.addEventListener('i18nReady', loadServices);
        }
    </script>
